server {
    listen 80;
    server_name _;

    # Static React app (SPA — fall back to index.html for client routes).
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → backend container (compose service name "backend").
    location /api/ {
        proxy_pass http://backend:8060;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache built static assets aggressively (they are content-hashed).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
